      4 scenarios:
      - chose neither
      - chose folder
          - CHANGE_EXPLORER_pickFolderInnerTextToChosenFolderFileName

          - has decided to add another folder thus creating a workspace

      - chose workspace

      - has not yet chosen
          - Pick: <Folder> or <Workspace>
      
      - chose folder
          - <ChosenFolderDisplayName> | Workspace: <ConvertToWorkspace> or <OpenWorkspaceFromFile>

      - chose folder + <ConvertToWorkspace>
          - <OpenFolder> | Workspace: <AddFolderToWorkspace> or <OpenWorkspaceFromFile> or <CloseWorkspace> or <SaveWorkspaceAs>
          -

      - Long term this probably won't stay this way it sounds like a LOT of buttons. But just do it and then move them after to something more sensible.

      - open file
      - parse as json
      - find top level "folders" property is array of object
          - each object has
              - property "path"

      Maybe don't show choose folder when have workspace it is confusing that you might add to workspace perhaps then clobber it all with a single folder being opened
      Then when u close the workspace u get the button to choose folder back.
      -->
